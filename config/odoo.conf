[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

db_host = odoo_db
db_port = 5432
db_user = odoo
db_password = odoo_pass
db_name = odoo_jkh

; Почтовый сервер (настроить под себя)
; smtp_server = smtp.gmail.com
; smtp_port = 587
; smtp_ssl = starttls
; smtp_user = your@email.com
; smtp_password = yourpassword

; Безопасность
admin_passwd = admin_master_password_change_me
list_db = True

; Производительность
workers = 2
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; Логирование
logfile = /var/log/odoo/odoo.log
log_level = info
