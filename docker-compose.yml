version: '3.8'

services:
  odoo:
    image: odoo:17.0
    container_name: odoo_dev
    restart: unless-stopped
    depends_on:
      odoo_db:
        condition: service_healthy
    ports:
      - "8069:8069"
      - "8072:8072"
    environment:
      - HOST=odoo_db
      - USER=odoo
      - PASSWORD=odoo_pass
    volumes:
      - odoo_data:/var/lib/odoo
      - ./extra-addons:/mnt/extra-addons
      - ./config/odoo.conf:/etc/odoo/odoo.conf
    networks:
      - odoo_network
    command: -- --dev=xml

  odoo_db:
    image: postgres:15
    container_name: odoo_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo_pass
      - POSTGRES_USER=odoo
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    networks:
      - odoo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  odoo_data:
  odoo_db_data:

networks:
  odoo_network:
    driver: bridge
